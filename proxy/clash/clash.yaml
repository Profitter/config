port: 7890           # HTTP 代理端口
socks-port: 7891     # Socks 端口
redir-port: 7892     # Redir 端口
mixed-port: 7893     # 混合端口
allow-lan: true      # 允许局域网连接
bind-address: "*"    # 地址绑定
mode: rule           # 规则模式
log-level: info      # 日志级别
ipv6: false          # IPV6开关
external-controller: 192.168.100.5:9090

dns:
  enable: false       # 不使用系统 DNS
  ipv6: false        # 关闭 IPV6
  listen: 0.0.0.0:53 # dns 监听
#  enhanced-mode: fake-ip
#  fake-ip-range: 198.18.0.1/16
#  fake-ip-filter:
#    - "*.lan"
#    - localhost.ptlogin2.qq.com
#    - +.srv.nintendo.net
#    - +.stun.playstation.net
#    - +.msftconnecttest.com
#    - +.msftncsi.com
#    - +.xboxlive.com
#    - msftconnecttest.com
#    - xbox.*.microsoft.com
#    - "*.battlenet.com.cn"
#    - "*.battlenet.com"
#    - "*.blzstatic.cn"
#    - "*.battle.net"
  nameserver:        # 默认 DNS 服务
    - 223.5.5.5
    - 119.29.29.29
  fallback:          # 国外 DNS 服务器
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
    - https://dns.alidns.com/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
#========= 建立锚点 =========#

# 策略组引用
pr:   &a3 {type: select,   proxies: [♻️ 负载分流, 🚀 手动切换, HK-香港, JP-日本, US-美国, TW-台湾, SG-新加坡, KR-韩国, DIRECT] }
p:    &a1 {type: http,     interval: 86400,  health-check: {enable: true, url: http://www.gstatic.com/generate_204, interval: 1800} }
auto: &a4 {type: url-test, lazy: true,  url: http://www.gstatic.com/generate_204, interval: 900, use: [Subscribe] }
use:  &a2 {type: select,   use: [Subscribe] }
c:    &a6 {type: http,     behavior: classical, interval: 86400}
d:    &a5 {type: http,     behavior: domain,    interval: 86400}
i:    &a7 {type: http,     behavior: ipcidr,    interval: 86400}

proxy-providers:
  Subscribe:
    <<: *a1
    url: 订阅地址在这里
    # URL后面填写格式1[单一订阅]: 直接填写你的机场Clash订阅[推荐此种方式，避免订阅泄露]
    # URL后面填写格式2[多个订阅]：https://api.nexconvert.com/sub?target=clash&url=请手动填入你的订阅(多机场订阅用|分割即可)&emoji=true&list=true&new_name=true&udp=false
    path: ./proxy_providers/tmp.yaml
    
proxies: null
proxy-groups:
#分流分组
  - {name: 🚀 手动切换, <<: *a2}
  - {name: 🌏 国际流量, <<: *a3}
  - {name: 🍎 Apple, <<: *a3}
  - {name: 📺 YouTube, type: select, proxies: [♻️ 负载分流, HK-香港, JP-日本, US-美国, TW-台湾, SG-新加坡, KR-韩国]}
  - {name: 📺 Bilibili, type: select, proxies: [DIRECT, HK-香港, TW-台湾]}
  - {name: 📺 Bahamult, type: select, proxies: [TW-台湾]}
#  - {name: 🤖 OpenAi,   type: select, proxies: [US-美国]}
#  - {name: 🎬 流媒体, <<: *a3}
  - {name: 🌌 Google, <<: *a3}
  - {name: 🌌 Microsoft, <<: *a3}
  - {name: 🌌 PikPak, <<: *a3}
  - {name: 📟 Telegram, <<: *a3}
#  - {name: 🐦 Twitter, <<: *a3}
  - {name: 🎮 游戏平台, <<: *a3}
  - {name: 🆎 AdBlock, type: select, proxies: [REJECT]}
  - {name: 🐟 其他流量, <<: *a3}
  
#节点分组
  - {name: HK-香港, <<: *a4, filter: "港|HK|(?i)Hong"           }             # a4更改为a2，即为手动选择
  - {name: JP-日本, <<:  *a4, filter: "日|东京|JP|(?i)Japan"     }             # a4更改为a2，即为手动选择     
  - {name: TW-台湾, <<: *a4, filter: "台|湾|TW|(?i)Taiwan"      }             # a4更改为a2，即为手动选择
  - {name: US-美国, <<: *a4, filter: "美|US|(?i)States|American"}             # a4更改为a2，即为手动选择
  - {name: SG-新加坡, <<: *a4, filter: "新|坡|SG|(?i)Singapore"    }            # a4更改为a2，即为手动选择  
  - {name: KR-韩国, <<: *a4, filter: "韩|KR|首尔|(?i)Korea"    }            # a4更改为a2，即为手动选择
  - {name: ♻️ 负载分流, <<: *a2, filter: "柬埔|马来|斯坦|尼泊|也纳|克兰|比利时|尔兰|立陶宛|冰岛|秘鲁|耳其|利亚|埃及|希腊|斯洛伐克|孟加|芬兰|阿联|卢森|英国|德国|南非|意大|法国|加拿|墨西|印度|越南|罗斯|瑞士|瑞典|智利|荷兰|比亚|巴西|沙特|班牙|泰国"    }            # a4更改为a2，即为手动选择

